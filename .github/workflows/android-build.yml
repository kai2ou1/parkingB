name: Android CI Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
  JAVA_VERSION: "17"
  GRADLE_VERSION: "8.5"

jobs:
  # ─── 代码检查 ───
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-disabled: true

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version=${{ env.GRADLE_VERSION }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - run: ./gradlew lint

      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint*
          retention-days: 14

  # ─── 单元测试 ───
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-disabled: true

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version=${{ env.GRADLE_VERSION }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - run: ./gradlew testDebugUnitTest

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-report
          path: app/build/reports/tests
          retention-days: 14

  # ─── 多架构编译 ───
  build:
    name: Build ${{ matrix.arch.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        arch:
          - name: Universal
            abi_flag: ""
            display: "通用包 (all ABIs)"
          - name: arm64-v8a
            abi_flag: -Pandroid.injected.build.abi=arm64-v8a
            display: "ARM 64位"
          - name: armeabi-v7a
            abi_flag: -Pandroid.injected.build.abi=armeabi-v7a
            display: "ARM 32位"
          - name: x86_64
            abi_flag: -Pandroid.injected.build.abi=x86_64
            display: "x86 64位 (模拟器)"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-disabled: true

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version=${{ env.GRADLE_VERSION }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK - ${{ matrix.arch.display }}
        run: |
          if [ -z "${{ matrix.arch.abi_flag }}" ]; then
            ./gradlew assembleDebug
          else
            ./gradlew assembleDebug ${{ matrix.arch.abi_flag }}
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ParkingBilling-debug-${{ matrix.arch.name }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

  # ─── 发布版编译（仅推送到 main 时触发）───
  release:
    name: Release ${{ matrix.arch.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [test, build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    strategy:
      fail-fast: false
      matrix:
        arch:
          - name: Universal
            abi_flag: ""
          - name: arm64-v8a
            abi_flag: -Pandroid.injected.build.abi=arm64-v8a
          - name: armeabi-v7a
            abi_flag: -Pandroid.injected.build.abi=armeabi-v7a

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-disabled: true

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version=${{ env.GRADLE_VERSION }}

      - name: Build Release APK - ${{ matrix.arch.name }}
        run: |
          if [ -z "${{ matrix.arch.abi_flag }}" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleRelease ${{ matrix.arch.abi_flag }}
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ParkingBilling-Release-${{ matrix.arch.name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
